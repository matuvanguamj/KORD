<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORD — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<script src="kord-loader.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-weight:300;background:#000;color:#fff;min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.left{border-right:0.5px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;justify-content:space-between;padding:44px 52px}
.left-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.02em;color:#fff;text-decoration:none}
.left-center{flex:1;display:flex;flex-direction:column;justify-content:center}
.left-tagline{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(34px,3.8vw,52px);text-transform:uppercase;letter-spacing:-.02em;line-height:.93;color:#fff}
.left-tagline em{font-style:normal;display:block;background:linear-gradient(90deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.left-copy{font-size:10px;font-weight:300;letter-spacing:.1em;color:rgba(255,255,255,0.18)}
.right{background:#f4f3f0;display:flex;align-items:center;justify-content:center;padding:64px}
.form{width:100%;max-width:380px}
.form-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:-.02em;text-transform:uppercase;color:#000;margin-bottom:8px}
.form-sub{font-size:13px;font-weight:300;color:#6b6b6b;margin-bottom:32px}
.social-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.btn-social{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 16px;background:#fff;border:0.5px solid rgba(0,0,0,0.15);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;color:#000;cursor:pointer;transition:background .2s;border-radius:0;-webkit-appearance:none}
.btn-social:hover{background:#f0f0f0}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:#bbb;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:#ddd}
.field{margin-bottom:20px}
.field label{display:block;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#000;margin-bottom:8px}
.field input{width:100%;background:#fff;border:0.5px solid rgba(0,0,0,0.15);color:#000;padding:14px 16px;font-family:'Inter',sans-serif;font-size:15px;font-weight:300;outline:none;transition:border-color .2s;border-radius:0;-webkit-appearance:none}
.field input:focus{border-color:#000}
.field input::placeholder{color:#bbb}
.btn{width:100%;margin-top:8px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:#000;border:none;padding:17px;cursor:pointer;transition:opacity .2s;position:relative;border-radius:0}
.btn:hover{opacity:.82}
.btn:disabled{opacity:.45;cursor:not-allowed}
.sp{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;position:absolute;right:20px;top:50%;transform:translateY(-50%)}
.btn.loading .sp{display:block}
.btn.loading .bt{opacity:0}
.err{display:none;font-size:13px;color:#c0392b;margin-bottom:18px;padding:12px 16px;background:#fff5f5;border:0.5px solid #fcc}
.err.show{display:block}
.foot{margin-top:26px;text-align:center;font-size:13px;color:#6b6b6b}
.foot a{color:#000;font-weight:500;text-decoration:none;border-bottom:0.5px solid #000}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}

@media(max-width:600px){
  body{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .left{padding:28px 24px 20px;min-height:auto}
  .left-center{display:none}
  .left-copy{display:none}
  .left-tagline{font-size:22px}
  .right{padding:32px 20px 48px}
  .form{max-width:100%}
  .field-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="left">
  <a href="index.html" class="left-logo" style="display:inline-flex;align-items:center;gap:5px;text-decoration:none;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="80 50 350 420" style="height:20px;width:auto;flex-shrink:0"><g fill="#000000"><rect x="112" y="150" width="50" height="214"/><rect x="234" y="72" width="52" height="156" transform="rotate(-47 260 150)"/><rect x="205" y="276" width="52" height="166" transform="rotate(42 231 359)"/></g></svg><span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:#000000;letter-spacing:.04em;line-height:1">KORD</span></a>
  <div class="left-center">
    <h2 class="left-tagline">Vos données<br>cachent de l'argent.<br><em>KORD le trouve.</em></h2>
  </div>
  <div class="left-copy">© KORD 2026</div>
</div>
<div class="right">
  <div class="form">
    <h1 class="form-title">Connexion</h1>
    <p class="form-sub">Accédez à votre espace client.</p>
    <div class="social-btns">
      <button class="btn-social" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continuer avec Google
      </button>
      <button class="btn-social" onclick="loginMicrosoft()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="0" y="0" width="8.5" height="8.5" fill="#F25022"/><rect x="9.5" y="0" width="8.5" height="8.5" fill="#7FBA00"/><rect x="0" y="9.5" width="8.5" height="8.5" fill="#00A4EF"/><rect x="9.5" y="9.5" width="8.5" height="8.5" fill="#FFB900"/></svg>
        Continuer avec Microsoft
      </button>
    </div>
    <div class="divider"><span>ou avec votre email</span></div>
    <div class="err" id="err"></div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="vous@entreprise.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="pw">Mot de passe</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn" id="btn" onclick="doLogin()">
      <span class="bt">Se connecter</span>
      <div class="sp"></div>
    </button>
    <div class="foot">Pas de compte ? <a href="register.html">Créer mon espace</a></div>
    <div style="margin-top:32px;text-align:center">
      <span id="kord-admin-trigger" onclick="adminClick()" style="display:inline-flex;align-items:center;gap:7px;font-size:10px;color:rgba(0,0,0,0.15);cursor:default;user-select:none"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="height:14px;width:14px;opacity:.15"><g fill="#000"><rect x="112" y="150" width="50" height="214"/><rect x="234" y="72" width="52" height="156" transform="rotate(-47 260 150)"/><rect x="205" y="276" width="52" height="166" transform="rotate(42 231 359)"/></g></svg><span style="font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:.05em">KORD</span></span>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://dtnkqxbyvnsybddbyelv.supabase.co'
const SUPABASE_ANON = 'sb_publishable_RqkmwDHNRAmxWvIwiBq39w_EGRyJT2f'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin() })

async function doLogin() {
  const email = document.getElementById('email').value.trim()
  const pw    = document.getElementById('pw').value
  const btn   = document.getElementById('btn')
  if(!email||!pw){ showErr('Veuillez remplir tous les champs.'); return }
  btn.classList.add('loading'); btn.disabled=true
  document.getElementById('err').classList.remove('show')
  try {
    const{error}=await sb.auth.signInWithPassword({email,password:pw})
    if(error){ showErr('Email ou mot de passe incorrect.'); return }
    if(window.kordMarkLogin) kordMarkLogin()
    window.location.href='dashboard.html'
  } catch(e) {
    showErr('Une erreur est survenue. Réessayez.')
  } finally {
    btn.classList.remove('loading'); btn.disabled=false
  }
}

async function loginGoogle(){
  await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/dashboard.html'}})
}
async function loginMicrosoft(){
  await sb.auth.signInWithOAuth({provider:'azure',options:{scopes:'email',redirectTo:window.location.origin+'/dashboard.html'}})
}
let adminClicks=0,adminTimer=null
function adminClick(){
  adminClicks++
  clearTimeout(adminTimer)
  adminTimer=setTimeout(()=>adminClicks=0,2500)
  if(adminClicks>=5){
    adminClicks=0
    const pw=prompt('Code :')
    if(pw==='KORD2026ADMIN'){
      sessionStorage.setItem('kord_admin_auth','1')
      window.location.href='admin.html'
    }
  }
}
function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.classList.add('show') }
// Si déjà connecté → dashboard direct (empêche retour arrière)
sb.auth.getSession().then(({data:{session}})=>{
  if(session){ window.location.replace('dashboard.html') }
})
</script>
</body>
</html>
